name: quality

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: apps/dashboard_web/package-lock.json
      - run: uv sync --all-groups
      - run: npm ci --prefix apps/dashboard_web
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts
      - run: uv run pyright
      - run: uv run pytest --cov=vex_contracts --cov=vex_data_engine --cov=vex_broker --cov=vex_strategy --cov=vex_replay --cov=vex_analytics --cov-report=term-missing
      - run: npm run check --prefix apps/dashboard_web
      - run: uv run vex-contracts validate --kind dataset-manifest --path examples/configs/dataset.template.yaml
      - run: uv run vex-contracts validate --kind data-engine-config --path examples/configs/data_engine.yaml
      - run: uv run vex-contracts validate --kind symbol-profile --path examples/configs/symbol_xauusd.yaml
      - run: uv run vex-contracts validate --kind strategy-descriptor --path examples/configs/strategy.yaml
      - run: uv run vex-contracts validate --kind run-config --path examples/configs/run.yaml
      - run: uv run vex-contracts validate --kind strategy-runtime-config --path examples/configs/strategy_runtime.yaml
      - run: uv run vex-contracts validate --kind analytics-config --path examples/configs/analytics.yaml
      - run: uv run vex-contracts validate --kind strategy-descriptor --path examples/configs/strategy_sdk_smoke.yaml
      - run: uv run vex-contracts validate --kind run-config --path examples/configs/run_strategy_smoke.yaml
      - run: uv run vex-contracts export-schemas --output schemas
      - run: git diff --exit-code schemas
