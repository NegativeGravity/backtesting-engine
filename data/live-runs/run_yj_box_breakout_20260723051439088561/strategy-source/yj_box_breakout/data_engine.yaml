schema_version: 1.0.0
cache_root: data/cache
cache_mode: refresh
trailing_bar_policy: mark_incomplete
parquet_compression: zstd
parquet_compression_level: 6
row_group_size: 131072
csv_block_size_bytes: 1048576
csv_batch_rows: 65536
csv_use_threads: false
file_import_workers: 1
max_issue_samples: 100
fail_on_warnings: false
cross_timeframe_audit: false
price_tolerance_ticks: 0
compare_tick_volume: true
