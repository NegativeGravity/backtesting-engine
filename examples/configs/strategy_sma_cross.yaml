schema_version: 1.0.0
strategy_id: sma_cross_demo
name: SMA Cross Demo
version: 1.0.0
entrypoint: vex_example_strategies.sma_cross:SmaCrossStrategy
description: End-to-end MT5 candle demo using a fast and slow moving-average crossover.
subscriptions:
  - symbol: XAUUSD
    timeframe: M1
    higher_timeframe_access: closed_only
  - symbol: XAUUSD
    timeframe: M5
    higher_timeframe_access: closed_only
  - symbol: XAUUSD
    timeframe: H1
    higher_timeframe_access: closed_only
capabilities:
  chart_drawings: true
  custom_series: true
  bar_events: true
  quote_events: false
  order_updates: true
default_parameters:
  symbol: XAUUSD
  signal_timeframe: M5
  fast_period: 10
  slow_period: 30
  volume_lots: "0.10"
  stop_distance_ticks: 800
  reward_risk_ratio: "2"
  allow_long: true
  allow_short: true
tags:
  - demo
  - sma
  - mt5
  - end_to_end
