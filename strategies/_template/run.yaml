risk:
  schema_version: 1.0.0
  default_sizing:
    mode: fixed_lot
    volume_lots: "0.10"
  max_open_positions: 1
  max_symbol_positions: 1
  allow_pyramiding: false
  allow_long: true
  allow_short: true
  max_margin_usage_percent: "80"
replay:
  enabled: true
  snapshot_interval_events: 5000
  persist_chart_commands: true
  persist_account_snapshots: true
