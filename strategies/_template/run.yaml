schema_version: 1.0.0
run_id: run_replace_me
name: Replace Me Strategy
dataset:
  dataset_id: xauusd_mt5_2025_2026
  version: "2"
strategy:
  strategy_id: replace_me
  version: 1.0.0
  instance_id: replace_me_primary
  parameters: {}
symbol_profiles:
  - profile_id: mt5_xauusd_default
    version: 1.0.0
start_time: 2025-01-02T01:05:00Z
end_time: 2026-07-13T13:22:00Z
execution_timeframe: M1
subscriptions:
  - symbol: XAUUSD
    timeframe: M1
    higher_timeframe_access: closed_only
account:
